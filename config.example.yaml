# Unified configuration file for SearXNG + Tavily Adapter
# 
# IMPORTANT: Copy this file to config.yaml and modify the settings as needed:
# cp config.example.yaml config.yaml
#
# Be sure to change:
# - server.secret_key (for SearXNG)
# - adapter.searxng_url (if needed)
# - adapter.scraper.user_agent (optional)

# =================================
# SearXNG Configuration (root level for SearXNG)
# =================================
use_default_settings: true

server:
  # base_url is defined in the SEARXNG_BASE_URL environment variable
  secret_key: "CHANGE_ME_TO_RANDOM_SECRET_KEY_32_CHARS_OR_MORE"  # MUST CHANGE!
  limiter: false  # Disabled for API usage
  image_proxy: true
  
# Format support (critical for API)
search:
  formats:
    - html
    - json    # Required for API!
    - csv
    - rss

# Redis/Valkey settings
valkey:
  url: redis://redis:6379/0

# Network request optimization
outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
  
# Search engine configuration
engines:
  - name: google
    disabled: false
  - name: bing
    disabled: true    # Disabled on request
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: startpage
    disabled: true    # Disabling problematic one
  - name: yacy images
    disabled: true    # Disabling problematic one
    name: karmasearch
    disabled: true    # Disabled to avoid rate limiting (403 errors)
  - name: karmasearch images
    disabled: true    # Disabled to avoid rate limiting
  - name: karmasearch videos
    disabled: true    # Disabled to avoid rate limiting
  - name: kickass
    disabled: true    # Disabled (problematic)

# =================================
# Tavily Adapter Configuration
# =================================
adapter:
  # Adapter server settings
  server:
    host: "0.0.0.0"
    port: 8000

  # URL to connect to SearXNG
  # Internal Docker URL (if in the same network): "http://searxng:8080"
  # External URL (if separate): "http://localhost:8999"
  searxng_url: "http://searxng:8080"

  # Scraper settings
  scraper:
    timeout: 10
    max_content_length: 2500
    user_agent: "Mozilla/5.0 (compatible; TavilyBot/1.0)"  # You can change to your own

  # Default search settings
  search:
    default_max_results: 10
    default_engines: "google,duckduckgo,brave"
    default_categories: "general"
    default_language: "auto"
    safesearch: 1

  # CORS settings for the adapter
  cors_origins:
    - "*"  # Change this to specific origins in production (e.g., ["http://localhost:3000", "http://localhost:8000"])
